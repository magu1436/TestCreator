<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %} My Project {% endblock %}</title>

        <!-- Bootstrap CSS -->
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

        {% load static %}
        <link rel="icon" type="image/png" href="{% static 'images/fabicon.png' %}">
        <link rel="stylesheet" href="{% static 'css/basestyle.css' %}">

        {% block loadcss %}
        <!-- CSSファイルのロードを記述 -->
        {% endblock %}
    </head>
    <body>
        <div class="w-100" style="height: 15vh;">
            {% include 'includes/header.html' %}
        </div>
        <main class="w-100" style="height: 85vh;">
            {% block content %}
            <!-- 各ページの中身を記述-->
            {% endblock %}

            <!-- Bootstrap JavaScript -->
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        </main>

        {% block loadjs %}
        <!-- JSファイルのロードを記述 -->
        {% endblock %}
        
        <script id="app-urls" type="application/json">
        {
            "wordbank:read": "{% url 'wordbank:read' %}",
            "wordbank:create": "{% url 'wordbank:create' %}",
            "wordbank:delete": "{% url 'wordbank:delete' %}",
            "wordbank:all_wordlist": "{% url 'wordbank:all_wordlist' %}",
            "quiz:preview": "{% url 'quiz:preview' %}",
            "quiz:create": "{% url 'quiz:create' %}",
            "vocab:delete": "{% url 'vocab:delete' %}",
            "vocab:editor": "{% url 'vocab:editor' %}",
            "vocab:register": "{% url 'vocab:register' %}",
            "vocab:reference": "{% url 'vocab:reference' %}",
            "vocab:update": "{% url 'vocab:update' %}",
            "ocr:ocr": "{% url 'ocr:ocr' %}"
        }
        </script>
    </body>
</html>
